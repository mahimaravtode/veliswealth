{
  "$schema": "https://render.com/schema/transparent.json",
  "services": [
    {
      "type": "web",
      "name": "velis-wealth-api",
      "env": "node",
      "buildCommand": "npm install && npm run build",
      "startCommand": "node dist/index.js",
      "envVars": [
        { "key": "NODE_ENV", "value": "production" },
        { "key": "PORT", "value": "10000" }
      ]
    }
  ]
}
